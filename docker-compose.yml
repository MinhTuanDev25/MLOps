services:
  churn-api:
    build: .
    container_name: churn-api
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/artifacts/best_model.pkl
      PREDICTION_LOG_PATH: /app/artifacts/prediction_log.csv
      PORT: 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./artifacts:/app/artifacts

